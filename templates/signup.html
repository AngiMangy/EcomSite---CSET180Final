<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="/styles/sign.css">
</head>
<body>
    <section>
        <!-- Basic Sign Up inputs -->
        <h2>Sign Up</h2>
        <input type="text" placeholder="Username" id="c_username" class="sign_input">
        <input type="text" placeholder="First Name" id="c_firstname" class="sign_input">
        <input type="text" placeholder="Last Name" id="c_lastname" class="sign_input">
        <input type="text" placeholder="Email" id="c_email" class="sign_input">
        <input type="text" placeholder="Password" id="c_password" class="sign_input">
        <input type="text" placeholder="Confirm Password" id="ch_password" class="sign_input">

        <!-- Checkbox to request Vendor Status -->
        <label for="vendor_sign">Click to request Vendor Status</label>
        <input type="checkbox" name="vendor_sign" id="vendor_sign">
    </section>
</body>
</html>
