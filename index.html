<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace - Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-outer-wrapper">
    <div class="login-panel">
      <h2 class="login-title">Sign in to Amazona</h2>
      <form id="loginForm" class="login-form">
        <input type="hidden" id="roleInput" value="customer">
        <div class="form-group hidden signup-only" id="firstNameGroup">
          <input type="text" id="firstName" placeholder="First Name" autocomplete="given-name">
        </div>
        <div class="form-group hidden signup-only" id="lastNameGroup">
          <input type="text" id="lastName" placeholder="Last Name" autocomplete="family-name">
        </div>
        <div class="form-group">
          <input type="text" id="username" placeholder="Username" autocomplete="username">
        </div>
        <div class="form-group hidden signup-only" id="emailGroup">
          <input type="email" id="email" placeholder="Email" autocomplete="email">
        </div>
        <div class="form-group">
          <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        </div>
        <div class="form-group hidden signup-only" id="confirmPasswordGroup">
          <input type="password" id="confirmPassword" placeholder="Confirm Password" autocomplete="new-password">
        </div>
        <div class="form-group hidden signup-only" id="vendorCheckboxGroup">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="vendorCheckbox"> Register as a Vendor
          </label>
        </div>
        <button type="submit" class="submit-button" id="submitButton">Sign In</button>
        <p class="note">Login as a buyer to shop the marketplace.</p>
        <p class="alt-action" id="authActionText">New here? <button type="button" id="toggleAuthMode">Create one</button></p>
      </form>
    </div>
    <div id="dashboard" class="dashboard">
      <div id="dashboardContent" class="dashboard-content"></div>
    </div>
  </div>

  <script>
    const roleInput = document.getElementById('roleInput');
    const confirmPasswordGroup = document.getElementById('confirmPasswordGroup');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const vendorCheckboxGroup = document.getElementById('vendorCheckboxGroup');
    const vendorCheckbox = document.getElementById('vendorCheckbox');
    const loginForm = document.getElementById('loginForm');
    const noteText = document.querySelector('.note');
    const authActionText = document.getElementById('authActionText');
    const loginModeBtn = document.getElementById('loginModeBtn');
    const signupModeBtn = document.getElementById('signupModeBtn');
    const submitButton = document.getElementById('submitButton');
    const loginPanel = document.querySelector('.login-panel');
    const dashboard = document.getElementById('dashboard');
    const dashboardContent = document.getElementById('dashboardContent');

    let authMode = 'login';

    function setRole(role) {
      roleInput.value = role;
      noteText.textContent = authMode === 'login'
        ? 'Login as a buyer to shop the marketplace.'
        : 'Sign up as a buyer to start shopping.';
    }

    function setAuthMode(mode) {
      authMode = mode;
      loginModeBtn?.classList.toggle('active', mode === 'login');
      signupModeBtn?.classList.toggle('active', mode === 'signup');
      document.querySelectorAll('.signup-only').forEach(el => el.classList.toggle('hidden', mode === 'login'));
      if (mode === 'login') vendorCheckbox.checked = false;
      submitButton.textContent = mode === 'login' ? 'Sign In' : 'Create Account';
      authActionText.innerHTML = mode === 'login'
        ? 'New here? <button type="button" id="toggleAuthMode">Create one</button>'
        : 'Already have an account? <button type="button" id="toggleAuthMode">Sign In</button>';

      setRole(roleInput.value);
    }

    function buildDashboard(role, user) {
      // Dashboard content can be used for future features
    }

    function showDashboard(role, user) {
      const authPayload = { role, user };
      localStorage.setItem('authenticatedUser', JSON.stringify(authPayload));
      window.location.href = 'store.html';
    }

    function showLogin() {
      loginPanel.classList.remove('hidden');
      dashboard.classList.add('hidden');
      dashboard.classList.remove('visible');
      loginForm.reset();
      setAuthMode('login');
      setRole('customer');
      localStorage.removeItem('authenticatedUser');
    }

    // Event delegation for the toggle auth mode button
    document.addEventListener('click', (e) => {
      if (e.target.id === 'toggleAuthMode') {
        setAuthMode(authMode === 'login' ? 'signup' : 'login');
      }
    });

    loginModeBtn?.addEventListener('click', () => setAuthMode('login'));
    signupModeBtn?.addEventListener('click', () => setAuthMode('signup'));

    loginForm.addEventListener('submit', async event => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        alert('Please enter your username and password.');
        return;
      }

      if (authMode === 'signup') {
        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const email = document.getElementById('email').value.trim();
        const confirmPassword = document.getElementById('confirmPassword').value.trim();

        if (!firstName || !lastName || !email) {
          alert('Please fill in all fields.');
          return;
        }
        if (password !== confirmPassword) {
          alert('Passwords do not match.');
          return;
        }

        const role = vendorCheckbox.checked ? 'vendor' : 'customer';
        try {
          const response = await fetch('/api/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ firstName, lastName, username, email, password, confirmPassword, role })
          });
          const result = await response.json();
          if (!response.ok) {
            alert(result.message || 'Sign up failed.');
            return;
          }
          loginForm.reset();
          setAuthMode('login');
          alert('Account created! Your account is pending admin approval. You will be able to log in once approved.');
        } catch {
          alert('Unable to reach the server. Please try again.');
        }
        return;
      }

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const result = await response.json();
        if (!response.ok) {
          alert(result.message || 'Authentication failed.');
          return;
        }
        showDashboard(result.role, result.user);
      } catch {
        alert('Unable to reach the authentication server. Please start the backend and try again.');
      }
    });

    window.addEventListener('load', () => {
      const stored = localStorage.getItem('authenticatedUser');
      if (stored) {
        const auth = JSON.parse(stored);
        if (auth && auth.role && auth.user) {
          showDashboard(auth.role, auth.user);
        }
      }
    });

    setAuthMode('login');
    setRole('customer');
  </script>
</body>
</html>
